name: test

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Verify zero runtime dependencies
        run: |
          deps=$(node -e "const p=require('./package.json'); console.log(Object.keys(p.dependencies||{}).length)")
          if [ "$deps" != "0" ]; then
            echo "package.json must declare zero runtime dependencies (found $deps)" >&2
            exit 1
          fi
      - run: node --test
